name: UI Tests with Allure Report

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # позволяет запускать вручную из интерфейса GitHub
  schedule:
    - cron: '0 8 * * 1'  # запуск каждый понедельник в 8:00 UTC

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Установка Chrome/Chromium
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install allure-pytest

      - name: Запуск тестов
        run: |
          pytest Tests/ \
            --alluredir=allure-results \
            --headless \
            --browser=chrome \
            -v \
            --tb=short \
            --timeout=300

      - name: Сохранить скриншоты (если тесты упали)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.python-version }}
          path: |
            latest_logs/
            downloaded_files/

      - name: Сохранить Allure-результаты
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.python-version }}
          path: allure-results/

  deploy-report:
    name: Deploy Allure Report
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Скачать Allure-результаты
        uses: actions/download-artifact@v4
        with:
          name: allure-results-3.11
          path: allure-results/

      - name: Сгенерировать Allure-отчёт
        uses: simple-elf/allure-report-action@v1.9
        with:
          allure_results: allure-results
          allure_history: allure-history

      - name: Опубликовать отчёт на GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          keep_files: false